<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/conta" color="dark"></ion-back-button>
    </ion-buttons>
    <ion-title class="logo-title">
      <ion-icon name="map-outline"></ion-icon> QuadraFácil
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">

  <div class="avatar-area" (click)="trocarFoto()">
    <div class="avatar">
      <ion-icon name="person-outline" *ngIf="!usuario?.fotoPerfil"></ion-icon>
      <img [src]="usuario?.fotoPerfil" *ngIf="usuario?.fotoPerfil">
    </div>
    <input type="file" #fileInput accept="image/*" (change)="onFotoSelecionada($event)" hidden>
  </div>

  <div class="info">
    <p><strong>Nome de usuário:</strong> {{ usuario?.nomeUsuario }}</p>
    <p><strong>Data de entrada:</strong> {{ usuario?.dataEntrada }}</p>
  </div>

  <ion-button expand="block" shape="round" color="danger" class="btn-excluir" (click)="excluirConta()">
    Excluir conta
  </ion-button>

</ion-content>

<ion-tab-bar slot="bottom">
  <ion-tab-button [disabled]="true">
    <ion-icon name="home-outline"></ion-icon>
    <ion-label>Início</ion-label>
  </ion-tab-button>
  <ion-tab-button [disabled]="true">
    <ion-icon name="search-outline"></ion-icon>
    <ion-label>Procurar</ion-label>
  </ion-tab-button>
  <ion-tab-button selected (click)="irParaConta()">
    <ion-icon name="person-outline"></ion-icon>
    <ion-label>Conta</ion-label>
  </ion-tab-button>
</ion-tab-bar>
