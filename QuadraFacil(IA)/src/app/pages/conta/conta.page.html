<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button fill="clear" color="dark">
        <ion-icon name="add-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title class="logo-title">
      <ion-icon name="map-outline"></ion-icon> QuadraFácil
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">

  <div class="avatar-area">
    <div class="avatar">
      <ion-icon name="person-outline" *ngIf="!usuario?.fotoPerfil"></ion-icon>
      <img [src]="usuario?.fotoPerfil" *ngIf="usuario?.fotoPerfil">
    </div>
    <p class="nome">{{ usuario?.nomeUsuario }}</p>
  </div>

  <div class="secao">
    <p class="secao-titulo">Informações</p>

    <ion-list lines="full">
      <ion-item button (click)="irParaMeuPerfil()">
        <ion-icon name="person-outline" slot="start" color="dark"></ion-icon>
        <ion-label>Meu Perfil</ion-label>
        <ion-icon name="arrow-forward-outline" slot="end" color="dark"></ion-icon>
      </ion-item>

      <ion-item [disabled]="true">
        <ion-icon name="warning-outline" slot="start" color="dark"></ion-icon>
        <ion-label>Denúncias</ion-label>
        <ion-icon name="arrow-forward-outline" slot="end" color="dark"></ion-icon>
      </ion-item>

      <ion-item [disabled]="true">
        <ion-icon name="notifications-outline" slot="start" color="dark"></ion-icon>
        <ion-label>Notificações</ion-label>
        <ion-icon name="arrow-forward-outline" slot="end" color="dark"></ion-icon>
      </ion-item>
    </ion-list>
  </div>

  <ion-button expand="block" shape="round" color="danger" class="btn-sair" (click)="sair()">
    Sair
  </ion-button>

</ion-content>
