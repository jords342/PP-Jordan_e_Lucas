<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>inicio</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">inicio</ion-title>
    </ion-toolbar>
  </ion-header>
</ion-content>
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

</head>
<body>

<!-- HEADER -->
<header class="mobile-header">
  <div class="mobile-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="12" y1="3" x2="12" y2="21"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
    QuadraFácil
  </div>
</header>

<!-- MAIN -->
<main class="main">
  <div class="feed" id="feed">

    <div class="row">
      <!-- CARD 1 -->
      <article class="court-card">
        <div class="court-img-wrap">
          <img src="https://images.unsplash.com/photo-1546519638-68e109498ffc?w=800&q=80" alt="Quadra de futsal" loading="lazy">
        </div>
        <div class="court-info">
          <div class="court-name">Quadra do Fulano</div>
          <div class="court-dist">A 1.5km</div>
        </div>
      </article>

      <!-- CARD 2 -->
      <article class="court-card">
        <div class="court-img-wrap">
          <img src="https://images.unsplash.com/photo-1608245449230-4ac19066d2d0?w=800&q=80" alt="Quadra de basquete" loading="lazy">
        </div>
        <div class="court-info">
          <div class="court-name">Quadra do Fulano</div>
          <div class="court-dist">A 1.5km</div>
        </div>
      </article>

      <!-- CARD 3 -->
      <article class="court-card">
        <div class="court-img-wrap">
          <img src="https://images.unsplash.com/photo-1626224583764-f87db24ac4ea?w=800&q=80" alt="Arena esportiva" loading="lazy">
        </div>
        <div class="court-info">
          <div class="court-name">Arena Timóteo</div>
          <div class="court-dist">A 3.0km</div>
        </div>
      </article>
    </div>

    <div class="row">
      <!-- CARD 4 -->
      <article class="court-card">
        <div class="court-img-wrap">
          <img src="https://images.unsplash.com/photo-1575361204480-aadea25e6e68?w=800&q=80" alt="Campo society" loading="lazy">
        </div>
        <div class="court-info">
          <div class="court-name">Campo do Bairro Progresso</div>
          <div class="court-dist">A 0.8km</div>
        </div>
      </article>

      <!-- CARD 5 -->
      <article class="court-card">
        <div class="court-img-wrap">
          <img src="https://images.unsplash.com/photo-1543351611-58f69d7c1781?w=800&q=80" alt="Quadra de tênis" loading="lazy">
        </div>
        <div class="court-info">
          <div class="court-name">Clube Recreativo Leste</div>
          <div class="court-dist">A 4.3km</div>
        </div>
      </article>
    </div>

    <div class="row">
      <!-- AD 1 -->
      <div class="ad-card">
        <div class="ad-visual">
          <img src="https://images.unsplash.com/photo-1552674605-db6ffd4facb5?w=300&q=70" alt="">
        </div>
        <div class="ad-content">
          <div class="ad-title">Play Video Games, they're good for you!</div>
          <div class="ad-sub">Anúncio patrocinado</div>
        </div>
      </div>

      <!-- AD 2 -->
      <div class="ad-card">
        <div class="ad-visual">
          <img src="https://images.unsplash.com/photo-1607962837359-5e7e89f86776?w=300&q=70" alt="">
        </div>
        <div class="ad-content">
          <div class="ad-title">Play Video Games, they're good for you!</div>
          <div class="ad-sub">Anúncio patrocinado</div>
        </div>
      </div>
    </div>

  </div>
</main>

<!-- TAB BAR -->
<nav class="tab-bar">
  <button class="tab-item active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    Início
  </button>
  <button class="tab-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    Procurar
  </button>
  <button class="tab-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
    </svg>
    Conta
  </button>
</nav>

<!-- SEARCH OVERLAY -->
<div class="search-overlay">
  <div class="search-input-row">
    <input class="search-box" type="text" placeholder="Buscar quadra, esporte, bairro…">
    <button class="cancel-btn" onclick="document.querySelector('.search-overlay').classList.remove('open')">Cancelar</button>
  </div>
</div>

<script>
  document.querySelectorAll('.tab-item').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab-item').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
    });
  });
</script>
</body>
</html>
